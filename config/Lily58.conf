# Enable encoder support (both sides)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Display enabled; zmk-nice-oled module owns the status screen
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Deep sleep after 15 min idle. Long enough to absorb normal work pauses without
# re-pairing, short enough to save battery overnight / weekends.
# Deep-sleep is the only reliable way to get OLED off in this firmware stack
# (blank-on-idle + wake-on-activity is broken regardless of config). Wake re-inits
# display cleanly; cost is ~1-2s BLE reconnect on first keypress after sleep.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Allow explicit soft-off via &soft_off
CONFIG_ZMK_PM_SOFT_OFF=y

# Disable ZMK Studio (we don't want runtime keymap edits overriding the compiled one)
CONFIG_ZMK_STUDIO=n

# No RGB on this build
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
