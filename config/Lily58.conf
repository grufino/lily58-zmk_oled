# Enable encoder support (both sides)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable OLED display
CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=4800000

# Disable ZMK Studio so runtime keymap edits can't silently override the compiled keymap
CONFIG_ZMK_STUDIO=n

# Keep OLED on while the keyboard is active (user prefers this over idle-blank)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Disable split battery-level proxy/fetching — these features write state to flash on
# first successful boot and the persisted data appears to break display init on
# subsequent power cycles. Both halves have their own OLED anyway, so the central
# doesn't need to display the peripheral's battery.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n

# Use the zmk-nice-oled custom status screen (proper layout for 128x32 OLED)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# We don't use RGB underglow on this build — shield's default leaves WS2812 SPI init half-configured
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

