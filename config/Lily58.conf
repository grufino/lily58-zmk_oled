# Enable encoder support (both sides)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable OLED display
CONFIG_ZMK_DISPLAY=y

# Deep sleep after 15 min idle (ZMK community default).
# Central wake-from-sleep bug (issue #3207) only affects ZMK main; we're on v0.3, safe.
CONFIG_ZMK_SLEEP=y
# Short deep-sleep timeout so OLED powers off ~2 min after you stop typing.
# Since the short-idle blanking path is broken in this module+version, using deep
# sleep (which physically cuts OLED power and re-inits on wake) is the only way
# to get "OLED on only while active". Tradeoff: small wake latency on first
# keypress after a break (BLE reconnect takes ~1-2s).
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=120000

# Default 30s short-idle — triggers BLANK_ON_IDLE which the built-in status screen
# handles correctly (unlike nice-oled, which had the wake bug).
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# Allow explicit soft-off via a &soft_off keybinding
CONFIG_ZMK_PM_SOFT_OFF=y

# Disable ZMK Studio so runtime keymap edits can't silently override the compiled keymap
CONFIG_ZMK_STUDIO=n

# Use ZMK's built-in status screen (no external module needed)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Built-in blanking + dedicated queue combo — the built-in screen DOES handle
# unblank on activity properly, unlike the nice-oled variant
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Font sized for 128x32 (shield default of MONTSERRAT_26 overflows)
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_14=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_14=y

# Keep only the two widgets that fit cleanly on 128x32
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n

# We don't use RGB underglow on this build — shield's default leaves WS2812 SPI init half-configured
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

