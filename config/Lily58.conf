# Enable encoder support (both sides)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable OLED display
CONFIG_ZMK_DISPLAY=y

# Deep sleep after 15 min idle (ZMK community default).
# Central wake-from-sleep bug (issue #3207) only affects ZMK main; we're on v0.3, safe.
CONFIG_ZMK_SLEEP=y
# Short deep-sleep timeout so OLED powers off ~2 min after you stop typing.
# Since the short-idle blanking path is broken in this module+version, using deep
# sleep (which physically cuts OLED power and re-inits on wake) is the only way
# to get "OLED on only while active". Tradeoff: small wake latency on first
# keypress after a break (BLE reconnect takes ~1-2s).
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=120000

# Disable the ZMK short-idle timer entirely (0 = never enter idle state).
# Why: ZMK core's app/src/display/main.c blanks the display on ZMK_ACTIVITY_IDLE
# under `if CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE`. The shield's `default n if NICE_OLED_ON`
# override doesn't actually beat ZMK's `default y if SSD1306`, and even the user-level
# =n override proved insufficient in practice. On top of that, the peripheral (right)
# half never receives ZMK_ACTIVITY_ACTIVE events (only the central does), so once the
# peripheral goes idle it stays idle forever — hence the "OLED dark, only fixes with
# power cycle" symptom we see on the right half specifically.
# By setting IDLE_TIMEOUT=0 neither half ever enters idle, so neither blanks.
CONFIG_ZMK_IDLE_TIMEOUT=0

# Allow explicit soft-off via a &soft_off keybinding (no bound key yet, but enabled for future use)
CONFIG_ZMK_PM_SOFT_OFF=y

# Disable ZMK Studio so runtime keymap edits can't silently override the compiled keymap
CONFIG_ZMK_STUDIO=n

# Keep OLED on while MCU is awake; let deep sleep (after 15 min) power it off.
# Using BLANK_ON_IDLE=y with zmk-nice-oled on v0.3 doesn't re-wake the display after
# blanking — the module's custom status screen doesn't handle the native unblank event.
# Module's own Kconfig default for OLED is =n for this reason.
# Battery tradeoff: ~15 min of OLED-lit idle per session vs ~80 min before.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Dedicated display work queue reduces input latency while widgets refresh
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Use the zmk-nice-oled custom status screen (proper layout for 128x32 OLED)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# We don't use RGB underglow on this build — shield's default leaves WS2812 SPI init half-configured
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

