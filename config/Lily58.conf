# Enable encoder support (both sides)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable OLED display
CONFIG_ZMK_DISPLAY=y

# Deep sleep after 80 min idle — matches your sofle config
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=4800000

# Disable ZMK Studio so runtime keymap edits can't silently override the compiled keymap
CONFIG_ZMK_STUDIO=n

# Per zmk-nice-oled module default for OLED: do NOT blank on ZMK idle.
# Instead, the display goes off when the MCU enters deep sleep (after
# IDLE_SLEEP_TIMEOUT = 80 min), and comes back when activity wakes the MCU.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Use the zmk-nice-oled custom status screen (proper layout for 128x32 OLED)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# We don't use RGB underglow on this build — shield's default leaves WS2812 SPI init half-configured
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

