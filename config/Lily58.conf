# Enable encoder support (both sides)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable OLED display
CONFIG_ZMK_DISPLAY=y

# Deep sleep after 15 min idle (ZMK community default).
# Central wake-from-sleep bug (issue #3207) only affects ZMK main; we're on v0.3, safe.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Allow explicit soft-off via a &soft_off keybinding (no bound key yet, but enabled for future use)
CONFIG_ZMK_PM_SOFT_OFF=y

# Disable ZMK Studio so runtime keymap edits can't silently override the compiled keymap
CONFIG_ZMK_STUDIO=n

# Blank OLED after 30s short-idle (ZMK default). OLED wakes instantly on next keypress.
# With BLANK_ON_IDLE=n (the previous value) the OLED stays lit 80 min before deep-sleep —
# 15-25 mA continuous draw from the SSD1306, which is the main reason for poor battery life.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Dedicated display work queue reduces input latency while widgets refresh
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Use the zmk-nice-oled custom status screen (proper layout for 128x32 OLED)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# We don't use RGB underglow on this build — shield's default leaves WS2812 SPI init half-configured
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

