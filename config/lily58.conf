# Enable encoder support (both sides)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable OLED display
CONFIG_ZMK_DISPLAY=y

# Deep sleep after 15 min idle — OLED powers off with the MCU; wakes on keypress
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Disable ZMK Studio so runtime keymap edits can't silently override the compiled keymap
CONFIG_ZMK_STUDIO=n

# Use the zmk-nice-oled custom status screen (proper layout for 128x32 OLED)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Peripheral: pokemon animation instead of the default cat
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=y

# Central: switch Luna (dog) to Bongo Cat for a more playful match with pokemon
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y

# RAW HID: show time and volume on central OLED (needs qmk-hid-host running on the Mac via USB)
CONFIG_NICE_OLED_WIDGET_RAW_HID=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_VOLUME=y
# Not yet: layout / weather / spotify
CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT=n
CONFIG_NICE_OLED_WIDGET_RAW_HID_WEATHER=n
CONFIG_NICE_OLED_WIDGET_RAW_HID_MEDIA_PLAYER_SPOTIFY_MACOS=n
# Module recommends bumping the dedicated display thread stack with RAW HID enabled
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=3072

# We don't use RGB underglow on this build — shield's default leaves WS2812 SPI init half-configured
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

